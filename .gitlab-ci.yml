stages:
  - deploy

default:
  image: node:20

variables:
  NPM_CONFIG_UPDATE_NOTIFIER: "false"

deploy_production:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - npm install -g @railway/cli
  script:
    - |
      for attempt in 1 2 3; do
        railway up --ci --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT" --service "$RAILWAY_SERVICE_NAME" && exit 0
        status=$?
        if [ "$attempt" = "3" ]; then
          exit "$status"
        fi
        sleep $((attempt * 20))
      done
